Ezreal:
  profile: |
    Ezreal the Prodigal Explorer. ADC marksman with skillshot kit and dash.
    Identity: skillshot blue-Q poke, E flash dash, R global skillshot.
    Strengths: safe with E dash, poke from range, lane bully with skillshots.
