Diana:
  profile: |
    Diana Scorn of the Moon. Jungle or mid AP fighter with reset ult.
    Identity: dash-pull AP bruiser, R AOE pull and damage reset, lunar passive AOE.
    Strengths: AOE damage, target access via R, snowball threat, mixed damage potential.
    Weaknesses: weak laning vs ranged mages, mana issues early, item-dependent.
