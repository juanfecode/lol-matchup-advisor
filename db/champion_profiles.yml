Aatrox:
  profile: |
    Aatrox the Darkin Blade. Top lane bruiser fighter with healing and crowd control.
    Identity: ranged-melee hybrid sweeping Q combos with sweet spots, self-healing on takedowns.
    Strengths: strong all-game teamfighter, sustain, lane bully, snowball threat.
    Weaknesses: weak vs ranged tops, vulnerable when E and R are on cooldown.
    Scaling: strong throughout the game, slight fall-off vs hyperscaling tanks late.
    Power spikes: level 6 (R), Eclipse/Goredrinker first item, level 11.
    Key items: Eclipse, Black Cleaver, Sterak's Gage, Death's Dance.
    Counters: Fiora, Camille, Riven, Kayle, Vayne top.
    Counters to: Garen, Sett, Mordekaiser, Darius, Renekton.
    Pro mains / streamers: Nuguri, TheShy.
    Pick when: you want a self-sufficient top laner with teamfight presence and lane pressure.

Ahri:
  profile: |
    Ahri the Nine-Tailed Fox. Mid lane mage assassin with high mobility.
    Identity: charm pick mage with three R dashes, roaming threat, safe lane phase.
    Strengths: mobility, safe lane, great roams, scales into late.
    Weaknesses: mana-hungry early, gets out-traded by burst mages, mediocre wave clear.
    Scaling: scales with items into late game, falls off vs full-AP burst comps.
    Power spikes: level 6 (R three dashes), Lost Chapter components, Luden's first item.
    Key items: Luden's Companion, Shadowflame, Rabadon's Deathcap, Zhonya's Hourglass.
    Counters: Fizz, Yasuo, Talon, LeBlanc, Kassadin late.
    Counters to: Twisted Fate, Lux, Karthus mid, Vex, Veigar.
    Pro mains / streamers: Faker, Chovy, ShowMaker.
    Pick when: comp needs mid pick potential and roams, vs immobile mages.

Akali:
  profile: |
    Akali the Rogue Assassin. Mid or top lane assassin with shroud and high mobility.
    Identity: invisible-shroud burst assassin, dash spam with R, energy-based no mana.
    Strengths: high outplay potential, snowball threat, target access, kit synergy.
    Weaknesses: weak laning vs ranged mages, hard to play in losing matchups, mediocre teamfight if behind.
    Scaling: power-pick early, drops off late vs heavy CC and tank itemization.
    Power spikes: level 6 (R), Hextech Rocketbelt, Lich Bane.
    Key items: Hextech Rocketbelt, Lich Bane, Shadowflame, Zhonya's Hourglass.
    Counters: Galio, Pantheon, Kassadin, Diana, Lissandra.
    Counters to: Orianna, Viktor, Lux, Zilean, Karma mid.
    Pro mains / streamers: Faker, Chovy.
    Pick when: enemy mid is immobile and squishy, you want carry assassin potential.

Akshan:
  profile: |
    Akshan the Rogue Sentinel. Mid or top lane marksman with grappling hook mobility.
    Identity: revive-allies passive, AD ranged caster, swing-and-shoot kit.
    Strengths: revive utility, mobility, ranged poke, target access via E.
    Weaknesses: weak vs all-in burst mages, terrain-dependent (E needs walls), squishy.
    Scaling: scales with crit items mid-late, falls off slightly vs heavy tanks.
    Power spikes: level 6 (R execute scaling), Eclipse/IE, 2-item spike.
    Key items: Eclipse, Manamune (Muramana), Infinity Edge, Lord Dominik's Regards.
    Counters: Vex, Annie, Pantheon, Diana, Malzahar.
    Counters to: Twisted Fate, Heimerdinger, Karthus, Lux, Vladimir.
    Pro mains / streamers: varies.
    Pick when: comp needs mid range damage and revive utility, map has good walls.

Alistar:
  profile: |
    Alistar the Minotaur. Support tank with engage combos and peel.
    Identity: headbutt-pulverize flash combo engage, point-and-click CC, R unkillable.
    Strengths: best engage in the game, peel for ADC, tankiness with R, lane bully.
    Weaknesses: weak laning if combos miss, low damage, mana issues early.
    Scaling: strong from level 2 (W+Q combo), tanky into late game.
    Power spikes: level 2 (combo online), level 6 (R), Locket of the Iron Solari.
    Key items: Locket of the Iron Solari, Knight's Vow, Zeke's Convergence, Thornmail.
    Counters: Janna, Lulu, Soraka, Karma, Morgana.
    Counters to: Senna, Sona, Velkoz support, Lux, Zyra.
    Pro mains / streamers: CoreJJ, Mikyx.
    Pick when: ADC needs hard engage and peel, comp benefits from flash combos.

Ambessa:
  profile: |
    Ambessa Medarda. Top lane bruiser fighter from Arcane lore.
    Identity: dash-combo bruiser with crowd control and burst patterns.
    Strengths: high outplay potential, mobility, burst damage, lane pressure.
    Weaknesses: needs to land combos to stay relevant, weak when behind, mana-hungry.
    Scaling: power-pick early to mid, falls off vs full-tank itemization late.
    Power spikes: level 6 (R), Eclipse/Goredrinker first item, level 11.
    Key items: Eclipse, Sterak's Gage, Death's Dance, Black Cleaver.
    Counters: Malphite, Sett, Pantheon, Renekton, Singed.
    Counters to: Yasuo, Yone, Riven, Camille, Irelia.
    Pro mains / streamers: varies.
    Pick when: you want carry top with outplay potential and snowball.

Amumu:
  profile: |
    Amumu the Sad Mummy. Jungle tank with AOE crowd control ult.
    Identity: bandage-toss engage, R AOE stun teamfight enabler, high damage tank.
    Strengths: best AOE engage in jungle, scales with AP, easy to pilot.
    Weaknesses: weak ganks pre-6, blue-buff-dependent, slow clear.
    Scaling: scales with team comp, hits hard with Sunfire and Liandry's.
    Power spikes: level 6 (R AOE stun), Sunfire Aegis, Liandry's Torment.
    Key items: Sunfire Aegis, Liandry's Torment, Riftmaker, Demonic Embrace.
    Counters: Lee Sin, Elise, Graves, Kindred, Karthus jungle.
    Counters to: Master Yi, Yasuo, Yone, Tryndamere, Katarina.
    Pro mains / streamers: varies.
    Pick when: enemy comp clumps in teamfights, you want AOE engage from jungle.

Anivia:
  profile: |
    Anivia the Cryophoenix. Mid lane control mage with revive passive.
    Identity: zone-control mage with wall, stuns, and double-life passive.
    Strengths: lane control, wave clear, teamfight zoning, hard to kill.
    Weaknesses: immobile, mana-hungry, vulnerable to dive comps.
    Scaling: scales hard into late game with full mage items.
    Power spikes: level 6 (R), Lost Chapter, Rod of Ages two-item spike.
    Key items: Rod of Ages, Seraph's Embrace, Rabadon's Deathcap, Zhonya's Hourglass.
    Counters: Kassadin, Yasuo, Talon, Zed, Fizz.
    Counters to: Lux, Vex, Twisted Fate, Karma, Lulu mid.
    Pro mains / streamers: varies.
    Pick when: comp needs zoning and wave control, vs heavy AD assassins is risky.

Annie:
  profile: |
    Annie the Dark Child. Mid or support mage with point-and-click stun.
    Identity: stun-stack burst mage, R Tibbers AOE, beginner-friendly carry.
    Strengths: reliable burst, point-and-click CC, easy to pilot, snowball threat.
    Weaknesses: low range, no mobility, mana issues early.
    Scaling: power-pick early to mid, falls off late vs heavy tank comps.
    Power spikes: level 6 (R Tibbers), 2-item spike with Luden's + Shadowflame.
    Key items: Luden's Companion, Shadowflame, Rabadon's Deathcap, Zhonya's Hourglass.
    Counters: Yasuo, Fizz, Kassadin, Talon, Diana.
    Counters to: Karthus, Vladimir, Lux, Heimerdinger, Twisted Fate.
    Pro mains / streamers: varies.
    Pick when: you want simple but effective burst mage, comp needs reliable stun.

Aphelios:
  profile: |
    Aphelios the Weapon of the Faithful. ADC marksman with five rotating weapons.
    Identity: weapon-rotation marksman, complex kit with diverse damage patterns, scales hard.
    Strengths: insane late-game scaling, weapon variety, high damage ceiling.
    Weaknesses: weak laning, complex to pilot, no mobility, weapon-dependent.
    Scaling: weak early, monstrous late-game hyperscaler.
    Power spikes: 2-item crit spike (IE + Phantom Dancer), level 11 onwards.
    Key items: Infinity Edge, Phantom Dancer, Lord Dominik's Regards, Bloodthirster.
    Counters: Draven, Lucian, Tristana, Caitlyn, Samira.
    Counters to: Sivir, Senna, Karthus ADC, Varus, Ezreal.
    Pro mains / streamers: Ruler, Gala.
    Pick when: comp can protect a hyperscaling carry, late game is the priority.

Ashe:
  profile: |
    Ashe the Frost Archer. ADC marksman with utility and global ult.
    Identity: slow-stacking utility ADC, global stun ult, vision via E.
    Strengths: reliable peel via slow passive, teamfight utility, R engage from anywhere.
    Weaknesses: low mobility, weak 1v1 pre-items, no escape.
    Scaling: scales steadily with crit, falls off vs hyperscalers like Vayne late.
    Power spikes: level 6 (R global stun), 2-item crit spike.
    Key items: Kraken Slayer, Runaan's Hurricane, Infinity Edge, Lord Dominik's Regards.
    Counters: Draven, Lucian, Samira, Tristana, Vayne.
    Counters to: Senna, Sivir, Karthus ADC, Aphelios early, Smolder.
    Pro mains / streamers: Doublelift (occasional), Rekkles.
    Pick when: comp needs global engage, peel via slows, stable utility ADC.

Aurelion Sol:
  profile: |
    Aurelion Sol the Star Forger. Mid lane scaling mage with stack-based ult.
    Identity: stack-collecting late-game scaler, AOE breath, R black hole.
    Strengths: insane late-game scaling, AOE damage, one-shot threat.
    Weaknesses: weak laning, stack-dependent, immobile.
    Scaling: weak early, monstrous late-game scaler.
    Power spikes: 200+ stacks, Rabadon's Deathcap, Liandry's Torment.
    Key items: Liandry's Torment, Rabadon's Deathcap, Zhonya's Hourglass, Cosmic Drive.
    Counters: Yasuo, Talon, Zed, LeBlanc, Kassadin.
    Counters to: Lux, Vex, Twisted Fate, Karma, Lulu mid.
    Pro mains / streamers: varies.
    Pick when: comp can protect a scaling carry, late game is the priority.

Aurora:
  profile: |
    Aurora the Witch Between Worlds. Mid lane mage with displacement and CC.
    Identity: hop-displacement mage with R isolation, AOE damage and pulls.
    Strengths: reliable CC, AOE damage, target isolation via R.
    Weaknesses: needs to land skillshots, weak vs mobile assassins.
    Scaling: scales with full AP items into late game.
    Power spikes: level 6 (R), Liandry's Torment, Rabadon's Deathcap.
    Key items: Liandry's Torment, Rabadon's Deathcap, Zhonya's Hourglass, Shadowflame.
    Counters: Yasuo, Talon, Zed, Fizz, Kassadin.
    Counters to: Lux, Vex, Twisted Fate, Veigar, Heimerdinger.
    Pro mains / streamers: varies.
    Pick when: comp needs reliable CC and pick potential from mid.

Azir:
  profile: |
    Azir the Emperor of the Sands. Mid lane mage marksman hybrid with soldiers.
    Identity: soldier-controlling mage with shuffle ult, AA-range manipulation, mechanical.
    Strengths: late-game hyperscaler, kiting potential, R "Shurima Shuffle" disengage.
    Weaknesses: weak laning, mechanically intensive, no escape pre-items.
    Scaling: weak early, monstrous late-game hyperscaler.
    Power spikes: 2-item AP spike (Nashor's + Liandry's), level 16.
    Key items: Nashor's Tooth, Liandry's Torment, Rabadon's Deathcap, Zhonya's Hourglass.
    Counters: Talon, Zed, LeBlanc, Kassadin, Fizz.
    Counters to: Lux, Vex, Twisted Fate, Karma, Lulu mid.
    Pro mains / streamers: Faker, Chovy, Caedrel (caster, ex-pro).
    Pick when: comp needs scaling carry mid, late game is the priority.

Bard:
  profile: |
    Bard the Wandering Caretaker. Support roaming utility mage with global ult.
    Identity: meep-stacking roamer, portals for engage, R global stasis.
    Strengths: roaming threat, global utility, pick potential, kiting.
    Weaknesses: weak laning, requires good map awareness, no engage if R missed.
    Scaling: scales with utility items and meep stacks.
    Power spikes: level 6 (R), Shurelya's Battlesong.
    Key items: Shurelya's Battlesong, Locket of the Iron Solari, Mikael's Blessing, Redemption.
    Counters: Leona, Nautilus, Pyke, Blitzcrank, Thresh.
    Counters to: Sona, Soraka, Senna, Yuumi, Lulu (squishy enchanters).
    Pro mains / streamers: varies.
    Pick when: comp can synergize with roaming support, you want pick potential.

Bel'Veth:
  profile: |
    Bel'Veth the Empress of the Void. Jungle attack-speed bruiser.
    Identity: void-empress bruiser with infinite attack speed cap during R.
    Strengths: fast clear, strong duels, late-game scaling, sustained damage.
    Weaknesses: lacks burst, weak vs heavy CC, item-dependent.
    Scaling: scales with attack speed and on-hit items into late.
    Power spikes: level 6 (R transform), 2-item spike (BORK + Kraken).
    Key items: Blade of the Ruined King, Kraken Slayer, Wit's End, Terminus.
    Counters: Master Yi, Diana, Lillia, Kindred, Olaf.
    Counters to: Sett, Garen, Aatrox, Renekton, Mordekaiser.
    Pro mains / streamers: varies.
    Pick when: comp needs sustained DPS jungler, late game is priority.

Blitzcrank:
  profile: |
    Blitzcrank the Great Steam Golem. Support engage tank with hook.
    Identity: hook-pull engage, point-and-click silence, R AOE silence.
    Strengths: pick potential via hook, lane pressure, snowball threat.
    Weaknesses: weak if hooks miss, bad teamfight teamfights, kited easily.
    Scaling: power-pick early to mid, falls off late vs full peel comps.
    Power spikes: level 2 (Q+E combo), Locket of the Iron Solari.
    Key items: Knight's Vow, Locket of the Iron Solari, Zeke's Convergence, Thornmail.
    Counters: Janna, Lulu, Morgana, Karma, Soraka.
    Counters to: Senna, Sona, Velkoz support, Yuumi, Zyra.
    Pro mains / streamers: varies.
    Pick when: comp needs pick potential, ADC has follow-up, lane bully support.

Brand:
  profile: |
    Brand the Burning Vengeance. Support or mid mage with AOE burn damage.
    Identity: blaze-stacking AOE mage, R bouncing damage, burst potential.
    Strengths: AOE damage, lane bully, teamfight zoning, burst potential.
    Weaknesses: immobile, no escape, mana issues early.
    Scaling: scales with AP items into late game.
    Power spikes: level 6 (R), Liandry's Torment, Rabadon's Deathcap.
    Key items: Liandry's Torment, Rylai's Crystal Scepter, Rabadon's Deathcap, Shadowflame.
    Counters: Yasuo, Pantheon, Talon, Zed, Diana.
    Counters to: Lux, Vex, Twisted Fate, Karma, Lulu mid.
    Pro mains / streamers: varies.
    Pick when: comp needs AOE damage and zoning, lane bully support or burst mid.

Braum:
  profile: |
    Braum the Heart of the Freljord. Support tank with shield and stun.
    Identity: stand-behind-me shield blocker, point-and-click leap, AA-stack stun.
    Strengths: best shielding in the game, peel for ADC, stun engage.
    Weaknesses: low damage, kited by ranged, weak vs heavy CC.
    Scaling: scales with tank items and ADC carry.
    Power spikes: level 2 (Q+W combo), Locket of the Iron Solari.
    Key items: Knight's Vow, Locket of the Iron Solari, Thornmail, Force of Nature.
    Counters: Lulu, Janna, Morgana, Soraka, Karma.
    Counters to: Senna, Sona, Velkoz support, Lux, Zyra.
    Pro mains / streamers: CoreJJ, Mikyx.
    Pick when: ADC needs peel and shielding, comp needs reliable engage.

Briar:
  profile: |
    Briar the Restrained Hunger. Jungle bruiser with self-frenzy mechanic.
    Identity: frenzied lifesteal bruiser, R global execute, low control kit.
    Strengths: self-sustain via lifesteal, late-game scaling, snowball threat.
    Weaknesses: hard to control during frenzy, weak vs heavy CC, unpredictable.
    Scaling: scales with bruiser items into late.
    Power spikes: level 6 (R), Sundered Sky, level 11.
    Key items: Sundered Sky, Bloodthirster, Sterak's Gage, Death's Dance.
    Counters: Lee Sin, Elise, Graves, Kindred, Lillia.
    Counters to: Master Yi, Yasuo, Yone, Tryndamere, Katarina.
    Pro mains / streamers: varies.
    Pick when: comp needs self-sufficient jungler with execute potential.

Caitlyn:
  profile: |
    Caitlyn the Sheriff. ADC marksman with the longest auto-attack range in the game (650).
    Identity: long-range siege carry, lane bully, trap and headshot kit.
    Strengths: dominant laning, strong objective sieging, safe poke.
    Weaknesses: weak vs assassins and dive comps, mediocre 1v1, needs peel.
    Scaling: strong early to mid game, slight late-game fall-off vs hyperscalers.
    Power spikes: level 2 (W trap online), level 6 (R execute), 2-item crit spike.
    Key items: Infinity Edge, Phantom Dancer, Lord Dominik's Regards, Rapid Firecannon.
    Counters: Draven, Lucian, Tristana, Zeri, Samira.
    Counters to: Senna, Sivir, Aphelios, Varus, Karthus ADC.
    Pro mains / streamers: Doublelift, Rekkles.
    Pick when: you want lane priority, safe poke, paired with engage support like Leona or Nautilus.

Camille:
  profile: |
    Camille the Steel Shadow. Top lane bruiser-assassin with hook mobility.
    Identity: hookshot-engage bruiser, true damage Q, point-and-click R isolation.
    Strengths: target access via E, true damage, snowball threat, late-game scaling.
    Weaknesses: weak laning vs ranged tops, needs items to come online.
    Scaling: scales hard with bruiser items into late game.
    Power spikes: level 6 (R), Trinity Force, level 11.
    Key items: Trinity Force, Sterak's Gage, Death's Dance, Spear of Shojin.
    Counters: Malphite, Garen, Renekton, Pantheon, Singed.
    Counters to: Yasuo, Yone, Riven, Aatrox, Irelia.
    Pro mains / streamers: TheShy, Nuguri, Zeus.
    Pick when: comp needs target-access bruiser, late game is the priority.

Cassiopeia:
  profile: |
    Cassiopeia the Serpent's Embrace. Mid lane mage with poison-stack damage.
    Identity: ground-stack mage, R AOE stun (face enemies), no boots passive.
    Strengths: high sustained damage, late-game scaler, lane bully vs melee.
    Weaknesses: immobile (no boots), weak vs assassins, mana issues early.
    Scaling: scales hard with full AP items into late game.
    Power spikes: level 6 (R), Liandry's Torment, Rabadon's Deathcap.
    Key items: Liandry's Torment, Rabadon's Deathcap, Zhonya's Hourglass, Shadowflame.
    Counters: Talon, Zed, LeBlanc, Kassadin, Fizz.
    Counters to: Garen, Renekton, Riven (mid pick), Lux, Vex.
    Pro mains / streamers: varies.
    Pick when: comp needs sustained mage damage, you can play immobile mage.

Cho'Gath:
  profile: |
    Cho'Gath Terror of the Void. Top lane stack-tank with true damage ult.
    Identity: stack-growing tank, knockup CC, R true damage execute.
    Strengths: scales with R stacks (HP and size), AOE knockup, lane sustain.
    Weaknesses: immobile, kited by ranged tops, weak early.
    Scaling: scales infinitely with R stacks into late.
    Power spikes: level 6 (R execute), Heartsteel, level 11.
    Key items: Heartsteel, Warmog's Armor, Thornmail (vs AD), Force of Nature (vs AP).
    Counters: Vladimir, Gangplank, Teemo, Kennen, Quinn.
    Counters to: Yasuo, Yone, Riven, Aatrox, Renekton.
    Pro mains / streamers: varies.
    Pick when: comp needs unkillable frontline, you want to scale into late.

Corki:
  profile: |
    Corki the Daring Bombardier. Mid lane AD-AP hybrid marksman.
    Identity: special-package missile mage, mixed damage, mid range artillery.
    Strengths: mixed damage profile, package buff for global mobility, poke.
    Weaknesses: weak laning vs assassins, mana issues early, mediocre wave clear.
    Scaling: scales with mixed AD/AP items into mid-late game.
    Power spikes: level 6 (R), Trinity Force, special package (12-30 min).
    Key items: Trinity Force, Manamune (Muramana), Lord Dominik's Regards, Black Cleaver.
    Counters: Talon, Zed, LeBlanc, Kassadin, Fizz.
    Counters to: Garen, Renekton, Riven, Lux, Veigar.
    Pro mains / streamers: varies.
