Darius:
  profile: |
    Darius the Hand of Noxus. Top lane juggernaut with bleed-stack execute.
    Identity: pull-bleed-execute juggernaut, snowball lane bully, R true damage reset.
    Strengths: lane dominance, true damage execute, snowball threat, teamfight reset.
    Weaknesses: kited by ranged tops, no mobility, weak vs hyperscalers.
