Dr. Mundo:
  profile: |
    Dr. Mundo the Madman of Zaun. Top lane regen-tank with cleanse passive.
    Identity: cleanse-CC tank, infinite regen, R massive HP regen, simple kit.
    Strengths: lane sustain, immune to CC every X seconds, late-game tank scaling.
